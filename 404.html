<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Luca</title>
    <!--
      GitHub Pages SPA fallback (single-page-apps-for-github-pages, rafgraph).
      Conserva el primer segmento del path (/LUCA/) y codifica el resto en la
      query como `?/ruta`, que index.html decodifica antes de cargar React.
    -->
    <script>
      var pathSegmentsToKeep = 1; // mantener /LUCA/
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
