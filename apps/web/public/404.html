<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Luca</title>
    <script>
      // GitHub Pages SPA fallback: redirige cualquier ruta desconocida al index
      // preservando el path original como hash para que React Router lo recoja.
      var path = window.location.pathname + window.location.search;
      var base = window.__BASE__ || '/';
      var clean = path.replace(base, '/');
      window.location.replace(base + '?p=' + encodeURIComponent(clean));
    </script>
  </head>
  <body></body>
</html>
