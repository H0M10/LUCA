name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web for Pages
        working-directory: apps/web
        env:
          # Ajusta a "/<nombre-del-repo>/" si publicas bajo USUARIO.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          # URL pública del backend cuando esté desplegado. Vacío = usa localhost:3000
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: pnpm build

      - name: Copy index.html as 404.html (SPA fallback)
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
